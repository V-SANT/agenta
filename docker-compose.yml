services:
  # 1. El servicio de Base de Datos
  mongodb:
    image: mongo:latest
    container_name: agenta_mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # 2. El servicio de Agenta
  agenta-app:
    build: .
    container_name: agenta_app
    ports:
      - "8501:8501"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  mongo_data:
